; On-device EPUB feasibility benchmark for the XIAO ESP32-S3 Plus.
; See README.md. Flash, open the serial monitor at 115200, read the report.
;
; NOTE: this is a C/C++ bring-up tool (not MicroPython like the other test tools)
; because it specifically measures the C++ EPUB/render path and the display port —
; the things we need real numbers on before deciding to fork CrossPoint.

[env:xiao_s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; XIAO ESP32-S3 Plus: 16MB flash, 8MB OPI PSRAM.
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi   ; XIAO S3 uses OPI PSRAM; change to qio_qspi if PSRAM isn't detected

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1     ; report prints over native USB-CDC

lib_deps =
  adafruit/Adafruit GFX Library @ ^1.11.9
  adafruit/Adafruit BusIO @ ^1.16.1
; SD and SPI ship with the arduino-esp32 framework (no lib_deps needed).
